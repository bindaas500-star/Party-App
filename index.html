<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PartyApp</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: linear-gradient(180deg, #1a1a2e, #16213e);
    color: #fff;
    min-height: 100vh;
  }
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ---- Auth Screen ---- */
  #authScreen { justify-content: center; align-items: center; padding: 20px; }
  .auth-box { width: 100%; max-width: 360px; background: rgba(255,255,255,0.06); padding: 24px; border-radius: 16px; }
  .auth-box h1 { text-align: center; margin-bottom: 20px; font-size: 24px; }
  .auth-box input {
    width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; font-size: 15px;
  }
  .auth-box input::placeholder { color: rgba(255,255,255,0.5); }
  .btn {
    width: 100%; padding: 13px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    background: linear-gradient(90deg, #ff6b9d, #c44dff); color: #fff; cursor: pointer; margin-top: 4px;
  }
  .btn:active { opacity: 0.8; }
  .toggle-link { text-align: center; margin-top: 14px; color: #a0a0ff; font-size: 14px; cursor: pointer; }
  .error-msg { color: #ff6b6b; font-size: 13px; margin-bottom: 10px; min-height: 16px; }

  /* ---- Main App ---- */
  #mainScreen { display: none; flex-direction: column; height: 100vh; }
  .topbar {
    display: flex; align-items: center; padding: 14px 16px; background: rgba(0,0,0,0.25);
    gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#ff6b9d,#c44dff);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0;
  }
  .topbar .name { font-weight: 600; font-size: 15px; }
  .topbar .vip { font-size: 11px; color: #ffd76a; }
  .logout-btn { margin-left: auto; background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 12px; }

  .chat-area { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 78%; padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.4; }
  .msg .sender { font-size: 11px; color: #ffd76a; margin-bottom: 3px; font-weight: 600; }
  .msg.other { background: rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg.me { background: linear-gradient(135deg,#ff6b9d,#c44dff); align-self: flex-end; border-bottom-right-radius: 4px; }

  .input-bar { display: flex; padding: 10px; gap: 8px; background: rgba(0,0,0,0.25); border-top: 1px solid rgba(255,255,255,0.08); }
  .input-bar input {
    flex: 1; padding: 11px 14px; border-radius: 22px; border: none; background: rgba(255,255,255,0.1); color: #fff; font-size: 14px;
  }
  .input-bar input::placeholder { color: rgba(255,255,255,0.5); }
  .send-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none; background: linear-gradient(135deg,#ff6b9d,#c44dff);
    color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0;
  }
  .loading { text-align: center; padding: 20px; color: rgba(255,255,255,0.5); font-size: 13px; }
</style>
</head>
<body>

<!-- ===== AUTH SCREEN ===== -->
<div id="authScreen" class="screen active">
  <div class="auth-box">
    <h1 id="authTitle">Welcome Back</h1>
    <div class="error-msg" id="authError"></div>
    <input type="text" id="nameInput" placeholder="Your name" style="display:none;">
    <input type="email" id="emailInput" placeholder="Email">
    <input type="password" id="passInput" placeholder="Password">
    <button class="btn" id="authSubmitBtn" onclick="handleAuth()">Login</button>
    <div class="toggle-link" id="toggleAuthMode" onclick="toggleAuthMode()">New here? Create an account</div>
  </div>
</div>

<!-- ===== MAIN APP SCREEN ===== -->
<div id="mainScreen" class="screen">
  <div class="topbar">
    <div class="avatar" id="userAvatar">?</div>
    <div>
      <div class="name" id="userName">User</div>
      <div class="vip">VIP 1</div>
    </div>
    <button class="logout-btn" onclick="handleLogout()">Logout</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="loading">Loading messages...</div>
  </div>

  <div class="input-bar">
    <input type="text" id="msgInput" placeholder="Say something..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  // ================================================
  // STEP 1: PASTE YOUR FIREBASE CONFIG HERE
  // ================================================
  const firebaseConfig = {
    apiKey: "AIzaSyCWFsDRzavLObytahjDj3cRYwsoSNuttaA",
    authDomain: "party-app-f2413.firebaseapp.com",
    databaseURL: "https://party-app-f2413-default-rtdb.firebaseio.com",
    projectId: "party-app-f2413",
    storageBucket: "party-app-f2413.firebasestorage.app",
    messagingSenderId: "1016955843509",
    appId: "1:1016955843509:web:db4f2393b4dc83c0cb5ffc",
    measurementId: "G-9QEVZLLM1Y"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  let isSignupMode = false;
  let currentUser = null;

  // ---------- AUTH MODE TOGGLE ----------
  function toggleAuthMode() {
    isSignupMode = !isSignupMode;
    document.getElementById('authTitle').textContent = isSignupMode ? "Create Account" : "Welcome Back";
    document.getElementById('authSubmitBtn').textContent = isSignupMode ? "Sign Up" : "Login";
    document.getElementById('toggleAuthMode').textContent = isSignupMode ? "Already have an account? Login" : "New here? Create an account";
    document.getElementById('nameInput').style.display = isSignupMode ? "block" : "none";
    document.getElementById('authError').textContent = "";
  }

  // ---------- SIGNUP / LOGIN ----------
  function handleAuth() {
    const email = document.getElementById('emailInput').value.trim();
    const pass = document.getElementById('passInput').value;
    const name = document.getElementById('nameInput').value.trim();
    const errorEl = document.getElementById('authError');
    errorEl.textContent = "";

    if (!email || !pass) { errorEl.textContent = "Please fill email and password."; return; }
    if (isSignupMode && !name) { errorEl.textContent = "Please enter your name."; return; }

    if (isSignupMode) {
      auth.createUserWithEmailAndPassword(email, pass)
        .then((cred) => {
          return db.ref('users/' + cred.user.uid).set({
            name: name,
            email: email,
            vip: 1,
            coins: 0,
            createdAt: Date.now()
          });
        })
        .catch((err) => { errorEl.textContent = err.message; });
    } else {
      auth.signInWithEmailAndPassword(email, pass)
        .catch((err) => { errorEl.textContent = err.message; });
    }
  }

  function handleLogout() {
    auth.signOut();
  }

  // ---------- AUTH STATE LISTENER ----------
  auth.onAuthStateChanged((user) => {
    if (user) {
      currentUser = user;
      db.ref('users/' + user.uid).once('value').then((snap) => {
        const data = snap.val() || { name: "User" };
        document.getElementById('userName').textContent = data.name;
        document.getElementById('userAvatar').textContent = data.name.charAt(0).toUpperCase();
      });
      document.getElementById('authScreen').classList.remove('active');
      document.getElementById('mainScreen').style.display = 'flex';
      listenToChat();
    } else {
      currentUser = null;
      document.getElementById('mainScreen').style.display = 'none';
      document.getElementById('authScreen').classList.add('active');
    }
  });

  // ---------- CHAT ----------
  function listenToChat() {
    const chatArea = document.getElementById('chatArea');
    db.ref('rooms/global/messages').limitToLast(50).on('value', (snap) => {
      chatArea.innerHTML = '';
      const messages = snap.val();
      if (!messages) {
        chatArea.innerHTML = '<div class="loading">No messages yet. Say hi!</div>';
        return;
      }
      Object.values(messages).forEach((msg) => {
        const div = document.createElement('div');
        const isMe = msg.uid === currentUser.uid;
        div.className = 'msg ' + (isMe ? 'me' : 'other');
        div.innerHTML = (isMe ? '' : `<div class="sender">${escapeHtml(msg.name)}</div>`) + escapeHtml(msg.text);
        chatArea.appendChild(div);
      });
      chatArea.scrollTop = chatArea.scrollHeight;
    });
  }

  function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !currentUser) return;

    db.ref('users/' + currentUser.uid).once('value').then((snap) => {
      const data = snap.val() || { name: "User" };
      db.ref('rooms/global/messages').push({
        uid: currentUser.uid,
        name: data.name,
        text: text,
        timestamp: Date.now()
      });
    });
    input.value = '';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>

</body>
</html>
