<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party App</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1030">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; }
  .app-shell { height: 100vh; height: 100dvh; height: var(--app-height, 100vh); }
  .panels-wrap {
    position: fixed; left: 0; right: 0; overflow: hidden;
    display: flex; flex-direction: column;
    top: var(--topbar-height, 78px);
    bottom: var(--bottomnav-height, 66px);
  }
  body {
    font-family: 'Inter', -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(255,77,141,0.25), transparent 45%),
      radial-gradient(circle at 90% 15%, rgba(78,205,196,0.18), transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(255,201,60,0.12), transparent 50%),
      #1a1030;
    color: #fdf8ff;
    min-height: 100vh;
  }
  h1, h2, h3, .display { font-family: 'Fredoka', 'Inter', sans-serif; }
  .screen { display: none; min-height: 100vh; min-height: 100dvh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ---- Auth Screen ---- */
  #authScreen { justify-content: center; align-items: center; padding: 24px; }
  .auth-logo {
    text-align: center; margin-bottom: 22px;
  }
  .auth-logo .emoji { font-size: 46px; display: block; margin-bottom: 6px; filter: drop-shadow(0 4px 12px rgba(255,201,60,0.5)); }
  .auth-logo .brand { font-family: 'Fredoka'; font-weight: 700; font-size: 26px; letter-spacing: 0.5px;
    background: linear-gradient(90deg, #ffd76a, #ff9dcb, #a78bfa);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .auth-box {
    width: 100%; max-width: 380px;
    background: linear-gradient(160deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.12);
    padding: 26px 22px; border-radius: 26px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
  }
  .auth-box h1 { text-align: center; margin-bottom: 22px; font-size: 21px; font-weight: 600; color: #fff; }
  .auth-box input {
    width: 100%; padding: 14px 16px; margin-bottom: 12px; border-radius: 14px;
    border: 1.5px solid rgba(255,255,255,0.14); background: rgba(0,0,0,0.22); color: #fff; font-size: 15px;
    font-family: 'Inter';
  }
  .auth-box input:focus { outline: none; border-color: #ff9dcb; }
  .auth-box input::placeholder { color: rgba(255,255,255,0.4); }
  .btn {
    width: 100%; padding: 15px; border: none; border-radius: 16px; font-size: 15px; font-weight: 700;
    font-family: 'Fredoka';
    background: linear-gradient(90deg, #ff6b9d, #c44dff);
    color: #fff; cursor: pointer; margin-top: 4px;
    box-shadow: 0 8px 22px rgba(255,77,157,0.35);
    letter-spacing: 0.3px;
  }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.35; box-shadow: none; }
  .toggle-link { text-align: center; margin-top: 16px; color: #c9b8ff; font-size: 13.5px; cursor: pointer; font-weight: 500; }
  .error-msg { color: #ff8a8a; font-size: 13px; margin-bottom: 10px; min-height: 16px; text-align: center; font-weight: 500; }

  /* ---- Main App ---- */
  #mainScreen { display: none; flex-direction: column; height: 100vh; }
  .topbar {
    display: flex; align-items: center; padding: 14px 16px; gap: 12px; flex-shrink: 0;
    background: rgba(30,15,50,0.98); border-bottom: 1px solid rgba(255,255,255,0.08);
    position: fixed; top: 0; left: 0; right: 0; z-index: 60; box-sizing: border-box;
  }
  .avatar-ring {
    width: 46px; height: 46px; border-radius: 50%; padding: 2.5px; flex-shrink: 0;
    background: linear-gradient(135deg, #ffd76a, #ff6b9d, #a78bfa);
  }
  .avatar {
    width: 100%; height: 100%; border-radius: 50%; background: #241539;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px;
    font-family: 'Fredoka'; color: #fff;
  }
  .topbar .name { font-weight: 700; font-size: 15px; font-family: 'Fredoka'; }
  .level-badge {
    display: inline-flex; align-items: center; gap: 3px; font-size: 10.5px; font-weight: 700;
    color: #2a1a05; background: linear-gradient(90deg, #ffd76a, #ffb347);
    padding: 2px 8px 2px 6px; border-radius: 20px; margin-top: 2px;
  }
  .logout-btn {
    margin-left: auto; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.16);
    color: #fff; padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; font-family: 'Inter';
  }

  /* ---- Bottom Nav ---- */
  .bottom-nav {
    display: flex; background: rgba(10,5,20,0.95); border-top: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
    padding: 6px 10px calc(6px + env(safe-area-inset-bottom, 0px));
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 60; box-sizing: border-box;
  }
  .nav-item {
    flex: 1; text-align: center; padding: 7px 2px; font-size: 9.5px; color: rgba(255,255,255,0.45); cursor: pointer;
    font-weight: 600; border-radius: 12px; transition: color .15s; white-space: nowrap;
  }
  .nav-item .nav-icon { display: block; font-size: 18px; margin-bottom: 2px; }
  .nav-item.active { color: #ffd76a; background: rgba(255,215,106,0.08); }

  /* ---- Content Panels ---- */
  .panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .panel.active { display: flex; }

  .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 78%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.45; }
  .msg .sender { font-size: 11px; color: #ffd76a; margin-bottom: 3px; font-weight: 700; }
  .msg.other { background: rgba(255,255,255,0.08); align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg.me {
    background: linear-gradient(135deg,#ff6b9d,#c44dff); align-self: flex-end; border-bottom-right-radius: 4px;
    box-shadow: 0 4px 14px rgba(255,77,157,0.25);
  }

  .input-bar { display: flex; padding: 12px; gap: 10px; background: rgba(0,0,0,0.25); border-top: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  .input-bar input {
    flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; font-family: 'Inter';
  }
  .input-bar input::placeholder { color: rgba(255,255,255,0.4); }
  .send-btn {
    width: 44px; height: 44px; border-radius: 50%; border: none; background: linear-gradient(135deg,#ff6b9d,#c44dff);
    color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0; box-shadow: 0 6px 16px rgba(255,77,157,0.35);
  }
  .loading { text-align: center; padding: 30px 20px; color: rgba(255,255,255,0.4); font-size: 13px; }

  /* ---- Messages Shortcuts ---- */
  .msg-shortcuts { display: flex; gap: 10px; padding: 14px 16px 4px; flex-shrink: 0; }
  .msg-shortcut {
    flex: 1; text-align: center; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 12px 6px; cursor: pointer;
  }
  .ms-icon { font-size: 20px; margin-bottom: 4px; }
  .ms-label { font-size: 10.5px; font-weight: 600; color: rgba(255,255,255,0.6); }

  /* ---- Room ---- */
  .room-title-bar {
    padding: 14px 16px; font-family: 'Fredoka'; font-weight: 700; font-size: 16px;
    background: rgba(0,0,0,0.2); flex-shrink: 0;
  }

  /* ---- Moments ---- */
  .moments-feed { flex: 1; overflow-y: auto; padding: 14px 16px 90px; }
  .moment-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 14px; margin-bottom: 14px;
  }
  .moment-card .mc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .moment-card .mc-avatar {
    width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#ff6b9d,#c44dff);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; font-family: 'Fredoka'; flex-shrink: 0;
  }
  .moment-card .mc-name { font-family: 'Fredoka'; font-weight: 600; font-size: 14px; }
  .moment-card .mc-time { font-size: 10.5px; color: rgba(255,255,255,0.4); font-weight: 500; }
  .moment-card .mc-text { font-size: 14px; line-height: 1.5; margin-bottom: 10px; white-space: pre-wrap; }
  .moment-card .mc-image { width: 100%; border-radius: 12px; display: block; max-height: 320px; object-fit: cover; }

  .moments-fab {
    position: absolute; right: 18px; bottom: 22px; width: 54px; height: 54px; border-radius: 50%;
    background: linear-gradient(135deg,#ff6b9d,#c44dff); color: #fff; font-size: 26px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 0 10px 26px rgba(255,77,157,0.4); z-index: 20;
  }
  .games-row { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; flex-shrink: 0; }

  /* ---- Room Explore ---- */
  .room-explore-banner {
    margin: 14px 16px 0; padding: 18px; border-radius: 16px; flex-shrink: 0;
    background: linear-gradient(135deg, #4a2f8f, #7b2f8f);
  }
  .reb-title { font-family: 'Fredoka'; font-weight: 700; font-size: 18px; color: #fff; }
  .reb-sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 4px; font-weight: 500; }

  .room-explore-tabs { display: flex; gap: 16px; padding: 14px 16px 8px; flex-shrink: 0; }
  .ret { font-family: 'Fredoka'; font-weight: 700; font-size: 14px; color: rgba(255,255,255,0.4); cursor: pointer; padding-bottom: 4px; }
  .ret.active { color: #ffd76a; border-bottom: 2px solid #ffd76a; }

  .create-room-box { display: flex; gap: 8px; padding: 8px 16px 14px; flex-shrink: 0; }
  .create-room-box input {
    flex: 1; padding: 11px 14px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.12);
    background: rgba(0,0,0,0.2); color: #fff; font-size: 13px; font-family: 'Inter';
  }
  .create-room-box .btn { width: auto; padding: 11px 18px; margin-top: 0; font-size: 13px; }

  .room-explore-list { flex: 1; overflow-y: auto; padding: 0 16px 20px; }
  .room-card {
    display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 13px; margin-bottom: 10px;
    cursor: pointer;
  }
  .room-card .rc-thumb {
    width: 50px; height: 50px; border-radius: 14px; flex-shrink: 0;
    background: linear-gradient(135deg,#ff6b9d,#c44dff); display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .room-card .rc-info { flex: 1; min-width: 0; }
  .room-card .rc-name { font-family: 'Fredoka'; font-weight: 700; font-size: 14.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .room-card .rc-sub { font-size: 11.5px; color: rgba(255,255,255,0.45); margin-top: 2px; font-weight: 500; }
  .room-card .rc-heat { font-size: 12px; color: #ff9d5c; font-weight: 700; font-family: 'Fredoka'; flex-shrink: 0; }
  .game-chip {
    flex-shrink: 0; padding: 8px 14px; border-radius: 16px; font-size: 12.5px; font-weight: 700;
    font-family: 'Fredoka'; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer; white-space: nowrap;
  }
  .seat-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 8px 16px 16px; flex-shrink: 0;
  }
  .seat-cell {
    aspect-ratio: 1; border-radius: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer;
  }
  .seat-cell.occupied { background: linear-gradient(160deg, rgba(255,215,106,0.18), rgba(255,107,157,0.1)); border-color: rgba(255,215,106,0.35); }
  .seat-cell .seat-avatar {
    width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg,#ff6b9d,#c44dff);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; font-family: 'Fredoka';
  }
  .seat-cell .seat-plus { font-size: 18px; color: rgba(255,255,255,0.3); }
  .seat-cell .seat-name { font-size: 9px; color: rgba(255,255,255,0.6); font-weight: 600; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---- Tic-Tac-Toe Overlay ---- */
  .ttt-overlay {
    position: fixed; inset: 0; z-index: 250; background: #1a1030;
    display: none; flex-direction: column; align-items: center; padding: 16px;
  }
  .ttt-overlay.show { display: flex; }
  .ttt-header { width: 100%; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .ttt-header button {
    background: rgba(255,255,255,0.08); border: none; color: #fff; width: 36px; height: 36px;
    border-radius: 50%; font-size: 18px; cursor: pointer;
  }
  .ttt-header h2 { font-family: 'Fredoka'; font-weight: 700; font-size: 18px; }
  .ttt-status { font-family: 'Fredoka'; font-weight: 600; font-size: 14px; color: #ffd76a; margin-bottom: 18px; text-align: center; }
  .ttt-board {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 300px; margin-bottom: 20px;
  }
  .ttt-cell {
    aspect-ratio: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka'; font-weight: 700; font-size: 34px; cursor: pointer; color: #fff;
  }

  /* ---- Family Panel ---- */
  .family-content { flex: 1; overflow-y: auto; padding: 18px 16px; }
  .level-card {
    background: linear-gradient(155deg, rgba(255,215,106,0.14), rgba(196,77,255,0.08));
    border: 1px solid rgba(255,215,106,0.25);
    border-radius: 20px; padding: 18px; margin-bottom: 18px;
  }
  .level-card .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .level-card .lv-label { font-size: 17px; font-weight: 700; color: #ffd76a; font-family: 'Fredoka'; }
  .level-card .xp-label { font-size: 12px; color: rgba(255,255,255,0.55); font-weight: 600; }
  .xp-bar-bg { height: 9px; background: rgba(0,0,0,0.3); border-radius: 5px; overflow: hidden; }
  .xp-bar-fill { height: 100%; background: linear-gradient(90deg,#ffd76a,#ff6b9d); border-radius: 5px; transition: width .3s; }

  .create-family-box {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 18px; margin-bottom: 22px;
  }
  .create-family-box h3 { font-size: 16px; margin-bottom: 12px; font-family: 'Fredoka'; font-weight: 600; }
  .create-family-box input {
    width: 100%; padding: 12px 14px; margin-bottom: 12px; border-radius: 12px;
    border: 1.5px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.2); color: #fff; font-size: 14px; font-family: 'Inter';
  }
  .lock-msg {
    font-size: 12px; color: #ffb4b4; margin-top: 8px; text-align: center; font-weight: 600;
    background: rgba(255,107,107,0.1); padding: 8px; border-radius: 10px;
  }

  .section-title { font-size: 12.5px; color: rgba(255,255,255,0.4); margin: 18px 0 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

  .family-item {
    display: flex; align-items: center; gap: 13px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 13px; border-radius: 16px; margin-bottom: 10px;
  }
  .family-item .f-avatar {
    width: 46px; height: 46px; border-radius: 14px; background: linear-gradient(135deg,#4ecdc4,#3a7bd5);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; flex-shrink: 0;
    font-family: 'Fredoka';
  }
  .family-item .f-info { flex: 1; min-width: 0; }
  .family-item .f-name { font-weight: 700; font-size: 14.5px; font-family: 'Fredoka'; }
  .family-item .f-members { font-size: 11.5px; color: rgba(255,255,255,0.45); margin-top: 2px; font-weight: 500; }
  .join-btn {
    background: linear-gradient(135deg,#ffd76a,#ff9d5c); border: none; color: #2a1a05;
    padding: 8px 16px; border-radius: 18px; font-size: 12.5px; font-weight: 700; font-family: 'Fredoka';
    box-shadow: 0 4px 12px rgba(255,215,106,0.3);
  }

  /* Inside a family view */
  .family-header {
    padding: 16px; background: rgba(0,0,0,0.2); display: flex; align-items: center; gap: 13px; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .family-header .f-avatar-lg {
    width: 54px; height: 54px; border-radius: 16px; background: linear-gradient(135deg,#4ecdc4,#3a7bd5);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 22px; flex-shrink: 0;
    font-family: 'Fredoka';
  }
  .family-header .f-title { font-size: 17px; font-weight: 700; font-family: 'Fredoka'; }
  .family-header .f-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; font-weight: 500; }
  .leave-btn {
    margin-left: auto; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.4); color: #ff8a8a;
    padding: 7px 14px; border-radius: 18px; font-size: 12px; font-weight: 700; font-family: 'Fredoka';
  }
  .members-strip { display: flex; gap: 10px; padding: 12px 16px; overflow-x: auto; flex-shrink: 0; background: rgba(0,0,0,0.12); }
  .member-chip {
    display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; width: 56px;
  }
  .member-chip .m-avatar {
    width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#ff6b9d,#c44dff);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; font-family: 'Fredoka';
  }
  .member-chip .m-name { font-size: 10px; color: rgba(255,255,255,0.65); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; font-weight: 500; }

  /* ---- Profile Overlay ---- */
  .profile-overlay {
    position: fixed; inset: 0; z-index: 200; background: #1a1030;
    display: none; flex-direction: column; overflow-y: auto;
  }
  .profile-overlay.show { display: flex; }
  .profile-overlay-header { padding: 16px; }
  .profile-overlay-header button {
    background: rgba(255,255,255,0.08); border: none; color: #fff; width: 36px; height: 36px;
    border-radius: 50%; font-size: 18px; cursor: pointer;
  }
  .profile-hero { text-align: center; padding: 0 20px 24px; }
  .profile-avatar-ring {
    width: 92px; height: 92px; border-radius: 50%; padding: 4px; margin: 0 auto 14px;
    background: linear-gradient(135deg, #ffd76a, #ff6b9d, #a78bfa);
  }
  .profile-avatar {
    width: 100%; height: 100%; border-radius: 50%; background: #241539;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 34px;
    font-family: 'Fredoka'; color: #fff;
  }
  .profile-name { font-family: 'Fredoka'; font-weight: 700; font-size: 22px; margin-bottom: 10px; }
  .profile-badges { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
  .badge-pill {
    font-family: 'Fredoka'; font-weight: 700; font-size: 12px; padding: 5px 14px; border-radius: 16px;
    background: linear-gradient(90deg, #ffd76a, #ffb347); color: #3a2410;
  }
  .badge-pill.vip-pill { background: linear-gradient(90deg, #4ecdc4, #3a7bd5); color: #fff; }
  .profile-id-row {
    font-size: 12.5px; color: rgba(255,255,255,0.5); display: flex; align-items: center;
    justify-content: center; gap: 6px; font-weight: 600;
  }
  .profile-id-row button { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 13px; cursor: pointer; }

  .profile-menu { padding: 0 16px 30px; display: flex; flex-directi
